name: Hourly Triage

on:
  schedule:
    # Hourly at :07 — avoids the top-of-hour cron stampede.
    - cron: "7 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  # Separate group from daily-review so the two don't block each other,
  # but per-workflow serialization (a slow run shouldn't overlap itself).
  group: hourly-triage
  cancel-in-progress: false

jobs:
  collect:
    name: Collect triage data
    runs-on: ubuntu-latest
    outputs:
      committed: ${{ steps.commit.outputs.committed }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.SITE_PUSH_TOKEN || github.token }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r scripts/requirements.txt

      - name: Collect triage
        env:
          # gh CLI uses GH_TOKEN. The default GITHUB_TOKEN is fine for
          # reading public repos; no Copilot scope needed for triage.
          GH_TOKEN: ${{ github.token }}
        run: python scripts/collect_triage.py

      - name: Configure git identity
        run: |
          git config user.name  "headlamp-triage-bot"
          git config user.email "headlamp-triage-bot@users.noreply.github.com"

      - name: Commit triage state
        id: commit
        run: |
          set -euo pipefail
          git add state/triage.json
          if git diff --cached --quiet; then
            echo "No triage changes."
            echo "committed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "Refresh PR triage data"
          # Retry-loop in case the daily-review workflow pushed between
          # our pull and our push.
          for i in 1 2 3; do
            if git push; then
              echo "committed=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            git pull --rebase
          done
          echo "Push failed after 3 retries" >&2
          exit 1

  build:
    name: Build site
    needs: collect
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build deps
        run: pip install -r scripts/requirements.txt

      - name: Build site
        run: python scripts/build_site.py

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site/_build

  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
